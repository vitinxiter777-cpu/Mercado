<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Mercado</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* CSS Básico para o site não quebrar */
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding-bottom: 70px; }
        .tela { display: none; padding: 15px; }
        .tela.ativa { display: block; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ccc; z-index: 1000; }
        nav button { flex: 1; padding: 15px; border: none; background: white; font-weight: bold; cursor: pointer; }
        nav button.ativo { color: blue; border-top: 3px solid blue; }
        .btn-acao { width: 100%; padding: 15px; background: blue; color: white; border: none; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        #camera-scanner { width: 100%; height: 250px; background: black; border-radius: 5px; }
        h2 { color: #333; }
    </style>
</head>
<body>

    <div id="tela-caixa" class="tela ativa">
        <h2>🛒 Caixa</h2>
        <div id="camera-scanner"></div>
        <input type="text" id="cod" placeholder="Código do produto..." style="width:100%; padding:10px; margin-top:10px; box-sizing:border-box;">
        <button class="btn-acao" onclick="biparManual()">Lançar Manualmente</button>
        <h3 style="margin-top: 20px;">Total: R$ <span id="valor-total">0.00</span></h3>
    </div>

    <div id="tela-cadastro" class="tela">
        <h2>⚙️ Configurações</h2>
        <button class="btn-acao" onclick="passoSair()" id="btn-sair" style="background: #d32f2f;">🚪 Sair da Conta</button>
    </div>

    <nav>
        <button class="ativo" onclick="mudarAba('caixa')">🛒 Caixa</button>
        <button onclick="mudarAba('cadastro')">⚙️ Cadastro</button>
    </nav>

    <script>
        // Função para alternar entre telas (Sem conflitos)
        function mudarAba(aba) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('ativo'));
            document.getElementById('tela-' + aba).classList.add('ativa');
            event.currentTarget.classList.add('ativo');
        }

        // Sistema de Sair Blindado
        let etapa = 0;
        function passoSair() {
            etapa++;
            let b = document.getElementById('btn-sair');
            if(etapa === 1) {
                b.innerText = "⚠️ Tem certeza?";
                b.style.background = "#ff9800";
            } else if(etapa >= 2) {
                window.location.href = "https://google.com";
            }
        }

        // Função para bipar manual
        function biparManual() {
            let codigo = document.getElementById('cod').value;
            if(codigo) {
                alert("Lançando produto: " + codigo);
                document.getElementById('cod').value = "";
            }
        }

        // Inicialização da Câmera com Tratamento de Erro (Não trava o site)
        window.onload = function() {
            try {
                const scanner = new Html5Qrcode("camera-scanner");
                scanner.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: 200 }, 
                    (c) => { console.log("Código lido: " + c); }
                ).catch(err => {
                    console.log("Câmera bloqueada ou indisponível: " + err);
                });
            } catch(e) {
                console.log("Erro ao inicializar scanner.");
            }
        };
    </script>
</body>
</html>
